<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dope Wars: High-Stakes Mogul</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #0a0a0a; color: #00ff00; padding: 10px; }
        .container { max-width: 1100px; margin: auto; border: 2px solid #00ff00; padding: 20px; box-shadow: 0 0 20px #00ff00; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; background: #1a1a1a; padding: 15px; border: 1px solid #00ff00; font-weight: bold; }
        .market-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; }
        .drug-card { border-bottom: 1px solid #222; padding: 15px 0; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        
        button { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 4px 8px; cursor: pointer; font-size: 0.75em; text-transform: uppercase; min-width: 55px; }
        button:hover { background: #00ff00; color: #000; }
        
        .buy-row button { border-color: #0088ff; color: #0088ff; }
        .buy-row button:hover { background: #0088ff; color: #000; }
        
        .sell-row button { border-color: #ff0000; color: #ff0000; }
        .sell-row button:hover { background: #ff0000; color: #fff; }
        
        .shark-btn { border-color: #ff9900 !important; color: #ff9900 !important; }
        .shark-btn:hover { background: #ff9900 !important; color: #000 !important; }

        .charts-area { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
        .chart-box { background: #000; border: 1px solid #333; height: 110px; padding: 5px; }
        .log { height: 100px; overflow-y: scroll; background: #000; padding: 10px; border: 1px solid #333; margin: 15px 0; font-size: 0.8em; }
        .danger { color: #ff0000; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; margin-top: 0;">DOPE WARS: 300 </h1>
    
    <div class="stats">
        <div>DAY: <span id="day">1</span>/300</div>
        <div>CASH: <span style="color: #fff;">$<span id="cash">2000</span></span></div>
        <div class="danger">DEBT: $<span id="debt">2000</span></div>
        <div>LOC: <span id="loc">Bronx</span></div>
    </div>

    <div class="market-grid">
        <div id="drug-list"></div>
        <div>
            <h3>TRAVEL</h3>
            <div class="btn-group">
                <button onclick="travel('Bronx')">Bronx</button>
                <button onclick="travel('Brooklyn')">Brooklyn</button>
                <button onclick="travel('Manhattan')">Manhattan</button>
                <button onclick="travel('Queens')">Queens</button>
                <button onclick="travel('Island')">S. Island</button>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            
            <h3>LOAN SHARK</h3>
            <button class="shark-btn" style="width: 100%; margin-bottom: 10px;" onclick="game.borrowMoney()">BORROW $10,000</button>
            <div class="btn-group">
                <button onclick="game.payDebt(1000)">PAY $1k</button>
                <button onclick="game.payDebt(10000)">PAY $10k</button>
                <button onclick="game.payDebt('all')">PAY ALL</button>
            </div>
        </div>
    </div>

    <div class="log" id="log">Keep your head down and your profit margins up.</div>

    <div class="charts-area" id="charts-container"></div>
</div>

<script>
const DRUGS = {
    "Cocaine": {low: 15000, high: 30000, color: '#ff0000'},
    "Heroin": {low: 5000, high: 14000, color: '#ffffff'},
    "Acid": {low: 1000, high: 4500, color: '#00ffff'},
    "Weed": {low: 300, high: 900, color: '#00ff00'},
    "Speed": {low: 70, high: 250, color: '#ffff00'}
};

let game = {
    day: 1, cash: 2000, debt: 2000, location: "Bronx",
    inventory: { "Cocaine": 0, "Heroin": 0, "Acid": 0, "Weed": 0, "Speed": 0 },
    currentPrices: {}, history: { "Cocaine": [], "Heroin": [], "Acid": [], "Weed": [], "Speed": [] },
    charts: {},

    init() {
        this.updatePrices();
        this.initCharts();
        this.render();
    },

    updatePrices() {
        for (let drug in DRUGS) {
            let price = Math.floor(Math.random() * (DRUGS[drug].high - DRUGS[drug].low) + DRUGS[drug].low);
            this.currentPrices[drug] = price;
            this.history[drug].push(price);
        }
    },

    borrowMoney() {
        this.cash += 10000;
        this.debt += 10000;
        this.log("Loaned $10,000. Interest is ticking...");
        this.render();
    },

    buy(drug, mode) {
        let price = this.currentPrices[drug];
        let qty = 0;
        let maxAffordable = Math.floor(this.cash / price);

        if (mode === '1') qty = 1;
        else if (mode === '10') qty = 10;
        else if (mode === '25%') qty = Math.floor(maxAffordable * 0.25);
        else if (mode === '50%') qty = Math.floor(maxAffordable * 0.50);
        else if (mode === 'max') qty = maxAffordable;

        if (qty > 0 && this.cash >= (qty * price)) {
            this.cash -= (qty * price);
            this.inventory[drug] += qty;
            this.log(`Bought ${qty} ${drug}.`);
            this.render();
        } else {
            this.log("Insufficient funds for that amount.");
        }
    },

    sell(drug, mode) {
        let qty = 0;
        let held = this.inventory[drug];

        if (mode === '1') qty = 1;
        else if (mode === '10') qty = 10;
        else if (mode === '25%') qty = Math.floor(held * 0.25);
        else if (mode === '50%') qty = Math.floor(held * 0.50);
        else if (mode === 'all') qty = held;

        qty = Math.min(qty, held);
        if (qty > 0) {
            this.cash += (qty * this.currentPrices[drug]);
            this.inventory[drug] -= qty;
            this.log(`Sold ${qty} ${drug}.`);
            this.render();
        }
    },

    payDebt(type) {
        let amt = 0;
        if (type === 'all') amt = this.debt;
        else amt = type;

        let finalPay = Math.min(this.cash, this.debt, amt);
        this.cash -= finalPay;
        this.debt -= finalPay;
        this.log(`Paid $${finalPay.toLocaleString()} to Loan Shark.`);
        this.render();
    },

    initCharts() {
        const container = document.getElementById('charts-container');
        for (let drug in DRUGS) {
            const box = document.createElement('div');
            box.className = 'chart-box';
            const canvas = document.createElement('canvas');
            box.appendChild(canvas);
            container.appendChild(box);
            this.charts[drug] = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: { labels: [1], datasets: [{ label: drug.toUpperCase(), data: [this.currentPrices[drug]], borderColor: DRUGS[drug].color, borderWidth: 1.5, pointRadius: 0, tension: 0.2 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { ticks: { color: '#00ff00', font: { size: 9 } }, grid: { color: '#111' } } }, plugins: { legend: { labels: { color: '#00ff00', font: { size: 10 } } } } }
            });
        }
    },

    updateCharts() {
        for (let drug in DRUGS) {
            let displayData = this.history[drug].slice(-40);
            this.charts[drug].data.labels = displayData.map((_, i) => i);
            this.charts[drug].data.datasets[0].data = displayData;
            this.charts[drug].update('none');
        }
    },

    log(msg) {
        const lb = document.getElementById('log');
        lb.innerHTML = `> ${msg}<br>` + lb.innerHTML;
    },

    render() {
        document.getElementById('day').innerText = this.day;
        document.getElementById('cash').innerText = Math.floor(this.cash).toLocaleString();
        document.getElementById('debt').innerText = Math.floor(this.debt).toLocaleString();
        document.getElementById('loc').innerText = this.location;

        let html = "";
        for (let drug in DRUGS) {
            html += `<div class="drug-card">
                <strong>${drug.toUpperCase()}</strong>: $${this.currentPrices[drug].toLocaleString()} | <strong>HELD: ${this.inventory[drug]}</strong>
                <div class="btn-group buy-row">
                    <button onclick="game.buy('${drug}', '1')">+1</button>
                    <button onclick="game.buy('${drug}', '10')">+10</button>
                    <button onclick="game.buy('${drug}', '25%')">25%</button>
                    <button onclick="game.buy('${drug}', '50%')">50%</button>
                    <button onclick="game.buy('${drug}', 'max')">MAX</button>
                </div>
                <div class="btn-group sell-row">
                    <button onclick="game.sell('${drug}', '1')">-1</button>
                    <button onclick="game.sell('${drug}', '10')">-10</button>
                    <button onclick="game.sell('${drug}', '25%')">25%</button>
                    <button onclick="game.sell('${drug}', '50%')">50%</button>
                    <button onclick="game.sell('${drug}', 'all')">ALL</button>
                </div>
            </div>`;
        }
        document.getElementById('drug-list').innerHTML = html;
        this.updateCharts();
    }
};

function travel(dest) {
    if (game.day >= 300) {
        alert("300 DAYS COMPLETE. Final Score: $" + Math.floor(game.cash - game.debt).toLocaleString());
        location.reload();
        return;
    }
    game.location = dest;
    game.day++;
    game.debt *= 1.05; 
    game.updatePrices();
    game.log(`Traveled to ${dest}. Interest compounded.`);
    game.render();
}

game.init();
</script>
</body>
</html>
